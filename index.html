<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora Eléctrica</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .campo { margin-bottom: 15px; }
        label { display: block; font-weight: bold; }
        input { padding: 8px; width: 200px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        #resultado { margin-top: 20px; font-size: 1.2em; color: #2c3e50; }
    </style>
</head>
<body>
    <h1>Cálculo de Corriente</h1>
    
    <div class="campo">
        <label>Potencia (P) en Watts:</label>
        <input type="number" id="potencia" placeholder="Ej: 5000">
    </div>

    <div class="campo">
        <label>Voltaje (V) en Voltios:</label>
        <input type="number" id="voltaje" placeholder="Ej: 220">
    </div>

    <button onclick="calcularElectrico()">Calcular Resultado</button>

    <div id="resultado">Resultado: -</div>

    <script src="script.js"></script>
</body>
</html>
